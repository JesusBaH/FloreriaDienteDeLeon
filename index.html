<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florería Diente de León | Próximamente</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --primario: #5d6d3e;
            --secundario: #f4e8c1;
            --acento: #d4a373;
            --texto: #333;
            --blanco: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--secundario);
            color: var(--texto);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            position: relative;
        }

        .background-circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .circle {
            position: absolute;
            background-color: rgba(93, 109, 62, 0.1); 
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        .circle:nth-child(1) { width: 100px; height: 100px; top: 10%; left: 10%; animation-delay: 0s; }
        .circle:nth-child(2) { width: 150px; height: 150px; top: 70%; left: 20%; animation-delay: 3s; }
        .circle:nth-child(3) { width: 80px; height: 80px; top: 30%; left: 80%; animation-delay: 6s; }
        .circle:nth-child(4) { width: 120px; height: 120px; top: 80%; left: 70%; animation-delay: 9s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        .container {
            text-align: center;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primario);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 400;
            color: var(--texto);
            margin-bottom: 15px;
            line-height: 1.2;
        }

        h1 span {
            font-style: italic;
            color: var(--acento);
        }

        p {
            font-size: 1.1rem;
            color: var(--texto);
            margin-bottom: 30px;
            font-weight: 300;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #25d366; 
            color: #fff;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 400;
            font-size: 1rem;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .whatsapp-btn img {
            width: 20px;
            height: 20px;
        }

        .whatsapp-btn:hover {
            background-color: #128c7e;
            transform: translateY(-3px);
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .logo { font-size: 1.8rem; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="background-circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="container">
        <div class="logo">Diente de León</div>
        <h1>Cuenta historias con flores<br><span>Próximamente</span></h1>
        <p>Estamos diseñando una experiencia floral única para ti. Muy pronto podrás explorar nuestro catálogo en línea.</p>
        
        <a href="https://wa.me/522223328721?text=Hola,%20me%20gustaría%20cotizar%20un%20ramo" class="whatsapp-btn" target="_blank" rel="noopener noreferrer">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            ¿Necesitas un ramo hoy? Escríbenos
        </a>

        <footer>
            &copy; 2026 Diente de León. Todos los derechos reservados.
        </footer>
    </div>

</body>
</html>
