<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florería Diente de León | Próximamente</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,200;0,400;1,200;1,400&family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #5d6d3e;
            --secundario: #ebead8;
            --acento: #d4a373;
            --texto: #333;
            --blanco: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        @keyframes floatBg {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--secundario);
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px 0;
        }

        .background-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: radial-gradient(var(--primario) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.04;
            animation: floatBg 30s linear infinite;
        }

        .container {
            padding: 60px 40px;
            background-color: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.03);
            max-width: 650px;
            width: 95%;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .logo-wrapper {
            width: 90px;
            height: 90px;
            margin-bottom: 25px;
            animation: fadeInUp 0.9s ease-out forwards;
        }

        .logo-wrapper img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--primario);
            text-transform: uppercase;
            letter-spacing: 9px;
            margin-bottom: 35px;
            display: block;
            opacity: 0;
            animation: fadeInUp 0.9s ease-out 0.2s forwards;
        }

        .content-group {
            max-width: 550px;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeInUp 0.9s ease-out 0.4s forwards;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 200;
            color: var(--texto);
            margin-bottom: 10px;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        h1 span {
            font-style: italic;
            color: var(--acento);
            display: block;
            font-size: 2rem;
            margin-top: 8px;
            font-weight: 400;
            letter-spacing: 0.5px;
            animation: breathe 3s ease-in-out infinite;
        }

        p {
            font-size: 1.1rem;
            color: var(--texto);
            font-weight: 300;
            line-height: 1.7;
            margin-top: 15px;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: #25d366;
            color: #fff;
            padding: 16px 35px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 400;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            animation: fadeInUp 0.9s ease-out 0.6s forwards, pulseGreen 2.5s infinite 1.5s;
        }

        .whatsapp-btn img {
            width: 22px;
            height: 22px;
        }

        .whatsapp-btn:hover {
            background-color: #128c7e;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.25);
        }

        footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: #aaa;
            letter-spacing: 1px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .container { padding: 50px 25px; }
            .logo-wrapper { width: 80px; height: 80px; }
            h1 { font-size: 2.6rem; }
            h1 span { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="background-texture"></div>

    <div class="container">
        <div class="logo-wrapper">
            <img src="assets/logo.png" alt="Logo">
        </div>

        <span class="brand-title">Florería Diente de León</span>

        <div class="content-group">
            <h1>Cuenta historias con flores<span>Próximamente</span></h1>
            <p>Estamos diseñando una experiencia floral única para ti. Muy pronto podrás explorar nuestro catálogo en línea.</p>
        </div>
        
        <a href="https://wa.me/522223328721?text=Hola,%20me%20gustaría%20cotizar%20un%20ramo" class="whatsapp-btn" target="_blank" rel="noopener noreferrer">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            ¿Necesitas un ramo hoy? Escríbenos
        </a>

        <footer>
            &copy; 2026 Florería Diente de León. Todos los derechos reservados.
        </footer>
    </div>

</body>
</html>
